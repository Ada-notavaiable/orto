<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1b4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Orto">
  <title>📊 Orto - Statistiche</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="stylesheet" href="/style.css">
  <style>
    .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .auto-refresh { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .auto-refresh input { accent-color: var(--primary); }
    .bar-chart { display: flex; flex-direction: column; gap: 0.6rem; }
    .bar-row { display: flex; align-items: center; gap: 0.6rem; }
    .bar-label { width: 90px; font-size: 0.85rem; font-weight: 500; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .bar-track { flex: 1; height: 28px; background: var(--accent-light); border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 6px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; padding-left: 0.5rem; min-width: fit-content; }
    .bar-value { font-size: 0.75rem; font-weight: 700; color: white; white-space: nowrap; padding-right: 0.4rem; }
    .bar-value-outside { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .last-update { font-size: 0.75rem; color: var(--text-muted); text-align: right; margin-top: 0.5rem; }
    .trend-up { color: var(--primary); }
    .trend-down { color: var(--danger); }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>📊 Statistiche</h1>
      <nav>
        <a href="/">Raccolta</a>
        <a href="/stats.html" class="active">Statistiche</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="refresh-bar">
      <div class="auto-refresh">
        <input type="checkbox" id="autoRefresh" checked>
        <label for="autoRefresh">Aggiorna ogni 2s</label>
        <span class="pulse" id="liveIndicator" style="color:var(--primary);">●</span>
      </div>
      <button class="btn btn-secondary btn-sm" id="refreshBtn">🔄 Aggiorna</button>
    </div>

    <div class="stat-card">
      <div class="stat-value" id="grandTotal">0 kg</div>
      <div class="stat-label">Peso Totale Raccolto</div>
    </div>

    <div class="stat-grid">
      <div class="stat-mini"><div class="stat-value" id="vegCount">0</div><div class="stat-label">Ortaggi</div></div>
      <div class="stat-mini"><div class="stat-value" id="harvestCount">0</div><div class="stat-label">Raccolte</div></div>
    </div>

    <div class="card">
      <div class="card-title">Peso per Ortaggio</div>
      <div id="barChart" class="bar-chart">
        <div class="empty-state"><div class="emoji">📊</div><p>Nessun dato ancora</p></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Raccolte per Mese</div>
      <div id="monthlyChart" class="bar-chart">
        <div class="empty-state"><div class="emoji">📅</div><p>Nessun dato</p></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Ultime 10 Raccolte</div>
      <div id="recentList"></div>
    </div>

    <div class="last-update" id="lastUpdate"></div>
  </main>

  <script>
    let refreshInterval = null;
    let previousGrandTotal = null;

    document.addEventListener('DOMContentLoaded', () => { loadStats(); setupAutoRefresh(); });
    document.getElementById('autoRefresh').addEventListener('change', setupAutoRefresh);
    document.getElementById('refreshBtn').addEventListener('click', loadStats);

    function setupAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval);
      if (document.getElementById('autoRefresh').checked) {
        refreshInterval = setInterval(loadStats, 2000);
        document.getElementById('liveIndicator').style.display = '';
      } else {
        document.getElementById('liveIndicator').style.display = 'none';
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        renderStats(data);
        document.getElementById('lastUpdate').textContent =
          'Ultimo aggiornamento: ' + new Date().toLocaleTimeString('it-IT');
      } catch (e) {
        document.getElementById('lastUpdate').textContent = '❌ Backend non raggiungibile';
      }
    }

    function renderStats(data) {
      const el = document.getElementById('grandTotal');
      el.textContent = data.grand_total.toFixed(1) + ' kg';
      if (previousGrandTotal !== null && data.grand_total > previousGrandTotal) {
        el.classList.add('trend-up'); el.classList.remove('trend-down');
      } else if (previousGrandTotal !== null && data.grand_total < previousGrandTotal) {
        el.classList.add('trend-down'); el.classList.remove('trend-up');
      }
      previousGrandTotal = data.grand_total;

      document.getElementById('vegCount').textContent = data.by_vegetable.length;
      document.getElementById('harvestCount').textContent =
        data.by_vegetable.reduce((s, v) => s + v.count, 0);

      const barChart = document.getElementById('barChart');
      if (data.by_vegetable.length === 0) {
        barChart.innerHTML = '<div class="empty-state"><div class="emoji">📊</div><p>Nessun dato ancora</p></div>';
      } else {
        const maxW = Math.max(...data.by_vegetable.map(v => v.total_weight));
        barChart.innerHTML = data.by_vegetable.map(v => {
          const pct = maxW > 0 ? (v.total_weight / maxW) * 100 : 0;
          const inside = pct > 25;
          return `<div class="bar-row">
            <div class="bar-label" title="${escapeHtml(v.name)}">${escapeHtml(v.name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%">
              ${inside ? `<span class="bar-value">${v.total_weight.toFixed(1)} kg</span>` : ''}
            </div></div>
            ${!inside ? `<span class="bar-value-outside">${v.total_weight.toFixed(1)} kg</span>` : ''}
          </div>`;
        }).join('');
      }

      const monthlyChart = document.getElementById('monthlyChart');
      if (data.monthly.length === 0) {
        monthlyChart.innerHTML = '<div class="empty-state"><div class="emoji">📅</div><p>Nessun dato</p></div>';
      } else {
        const maxM = Math.max(...data.monthly.map(m => m.total_weight));
        const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
        monthlyChart.innerHTML = data.monthly.map(m => {
          const pct = maxM > 0 ? (m.total_weight / maxM) * 100 : 0;
          const [y, mo] = m.month.split('-');
          const inside = pct > 25;
          return `<div class="bar-row">
            <div class="bar-label">${months[parseInt(mo)-1]} ${y}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%">
              ${inside ? `<span class="bar-value">${m.total_weight.toFixed(1)} kg (${m.count})</span>` : ''}
            </div></div>
            ${!inside ? `<span class="bar-value-outside">${m.total_weight.toFixed(1)} kg</span>` : ''}
          </div>`;
        }).join('');
      }

      const recentList = document.getElementById('recentList');
      if (data.recent.length === 0) {
        recentList.innerHTML = '<div class="empty-state"><p>Nessuna raccolta</p></div>';
      } else {
        recentList.innerHTML = data.recent.map(h => {
          const [y, m, d] = h.date.split('-');
          return `<div class="harvest-item">
            <div class="harvest-icon">🥬</div>
            <div class="harvest-info">
              <div class="harvest-name">${escapeHtml(h.vegetable_name)}</div>
              <div class="harvest-meta"><span>📅 ${d}/${m}/${y}</span></div>
            </div>
            <div class="harvest-weight">${h.weight} kg</div>
          </div>`;
        }).join('');
      }
    }

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
