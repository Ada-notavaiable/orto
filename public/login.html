<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1b4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🔐 Login - OrtPWA</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="login-container">
    <div class="login-card">
      <div class="login-icon">🌿</div>
      <h1>OrtPWA</h1>
      <p class="login-subtitle">Raccolto Orto</p>
      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="user">Utente</label>
          <input type="text" id="user" name="user" required autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label for="pass">Password</label>
          <input type="password" id="pass" name="pass" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">🔐 Entra</button>
        <p class="login-error" id="loginError" role="alert" aria-live="polite"></p>
      </form>
      <p class="login-hint">⚠️ I dati vengono salvati solo su <strong>questo browser</strong>. Per spostarli: Esporta JSON dalla pagina principale.</p>
    </div>
  </main>

  <script src="./auth.js"></script>
  <script>
    // Se già autenticato, salta il login
    if (Auth.isAuthed()) {
      const next = new URLSearchParams(location.search).get('next');
      location.replace(Auth.safeNext(next));
    }

    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      const u = document.getElementById('user').value.trim();
      const p = document.getElementById('pass').value;
      btn.disabled = true;
      btn.textContent = '⏳ Verifica...';
      try {
        const ok = await Auth.login(u, p);
        if (ok) {
          const next = new URLSearchParams(location.search).get('next');
          location.replace(Auth.safeNext(next));
        } else {
          errEl.textContent = '❌ Credenziali non valide';
          document.getElementById('pass').value = '';
          document.getElementById('pass').focus();
          setTimeout(() => { errEl.textContent = ''; }, 4000);
        }
      } catch (err) {
        errEl.textContent = '❌ Errore: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '🔐 Entra';
      }
    });
  </script>
</body>
</html>
